<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Instagram</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 15px 0;
    }
    .language {
      font-size: 14px;
      color: #a8a8a8;
      margin-bottom: 28px;
      text-align: center;
    }
    .logo {
      width: 82px;
      height: 82px;
      margin: 0 auto 32px;
      border-radius: 12px;
      object-fit: contain;
    }
    .card {
      width: 100%;
      max-width: 350px;
      background: #121212;
      border: 1px solid #363636;
      border-radius: 12px;
      padding: 28px 20px 20px;
      text-align: center;
    }
    input {
      width: 100%;
      background: #1c1c1c;
      border: 1px solid #363636;
      border-radius: 8px;
      padding: 13px 12px;
      margin: 7px 0;
      color: #fff;
      font-size: 15px;
    }
    input::placeholder {
      color: #8e8e8e;
    }
    input:focus {
      outline: none;
      border-color: #a8a8a8;
    }
    .btn-entrar {
      width: 100%;
      background: #0095f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 0;
      font-weight: 700;
      font-size: 15px;
      margin: 15px 0 8px;
      cursor: pointer;
    }
    .btn-entrar:active {
      background: #1877f2;
    }
    .forgot {
      color: #0095f6;
      font-size: 13px;
      margin: 12px 0 22px;
      text-decoration: none;
      display: block;
    }
    .btn-criar {
      width: 100%;
      background: transparent;
      border: 1px solid #0095f6;
      color: #0095f6;
      border-radius: 30px;
      padding: 11px 0;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }
    .meta {
      margin-top: 32px;
      font-size: 14px;
      color: #8e8e8e;
      text-align: center;
    }
    .footer {
      margin-top: auto;
      padding: 35px 0 15px;
      text-align: center;
      font-size: 12px;
      color: #8e8e8e;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="language">Português (Brasil)</div>

  <!-- LOGO EXATO DO INSTAGRAM (ícone colorido gradient, igual sua foto) -->
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_icon.png/1024px-Instagram_icon.png" 
       class="logo" alt="Instagram">

  <div class="card">
    <form>
      <input type="text" placeholder="Nome de usuário, email ou celular" required>
      <input type="password" placeholder="Senha" required>
      <button type="submit" class="btn-entrar">Entrar</button>
    </form>

    <a href="#" class="forgot">Esqueceu a senha?</a>

    <button class="btn-criar">Criar nova conta</button>
  </div>

  <div class="meta">∞ Meta</div>

  <div class="footer">
    Meta • Sobre • Blog • Carreiras • Ajuda • API • Privacidade • Termos • Localizações • Instagram Lite • Threads • Meta Verified<br>
    Português (Brasil) © 2026 Instagram from Meta
  </div>

</body>
</html>
