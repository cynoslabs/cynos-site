<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 15px;
    }
    .container {
      width: 100%;
      max-width: 350px;
    }
    .slogan {
      font-size: 17px;
      line-height: 20px;
      text-align: center;
      margin-bottom: 24px;
      color: #a8a8a8;
    }
    .slogan span {
      font-weight: 600;
      background: linear-gradient(90deg, #f56040, #c13584, #833ab4, #405de6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card {
      background: #121212;
      border: 1px solid #363636;
      border-radius: 8px;
      padding: 30px 20px 20px;
      text-align: center;
    }
    .title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    input {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #363636;
      border-radius: 6px;
      padding: 12px 10px;
      margin: 8px 0;
      color: #fff;
      font-size: 14px;
    }
    input::placeholder { color: #8e8e8e; }
    input:focus { outline: none; border-color: #a8a8a8; }
    .btn-entrar {
      width: 100%;
      background: #0095f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      font-size: 15px;
      margin: 12px 0;
      cursor: pointer;
    }
    .btn-entrar:hover { background: #1877f2; }
    .forgot {
      color: #0095f6;
      font-size: 13px;
      text-decoration: none;
      display: block;
      margin: 12px 0 20px;
    }
    .fb-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #363636;
      color: #fff;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 15px;
    }
    .create-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #0095f6;
      color: #0095f6;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      margin-top: 10px;
    }
    .meta {
      text-align: center;
      margin-top: 30px;
      color: #8e8e8e;
      font-size: 14px;
    }
    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: #8e8e8e;
      line-height: 1.6;
    }
    .footer a {
      color: #8e8e8e;
      text-decoration: none;
      margin: 0 5px;
    }
  </style>
</head>
<body>

  <div class="container">
    <p class="slogan">
      Veja momentos do dia a dia dos <span>seus amigos próximos</span>.
    </p>

    <div class="card">
      <div class="title">Entrar no Instagram</div>

      <form>
        <input type="text" placeholder="Número de celular, nome de usuário ou email" required>
        <input type="password" placeholder="Senha" required>
        <button type="submit" class="btn-entrar">Entrar</button>
      </form>

      <a href="#" class="forgot">Esqueceu a senha?</a>

      <button class="fb-btn">
        <i class="fab fa-facebook-square"></i> Entrar com o Facebook
      </button>

      <button class="create-btn">Criar nova conta</button>
    </div>

    <div class="meta">∞ Meta</div>
  </div>

  <div class="footer">
    <div>
      Meta • Sobre • Blog • Carreiras • Ajuda • API • Privacidade • Termos • Localizações • Instagram Lite • Threads • Meta Verified
    </div>
    <div style="margin-top: 12px;">
      Português (Brasil) © 2026 Instagram from Meta
    </div>
  </div>

</body>
</html>
